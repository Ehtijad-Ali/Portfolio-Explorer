<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Portfolio Explorer — 1,750+ Developer & Designer Portfolios for Inspiration</title>
    <meta name="description" content="Browse 1,750+ curated portfolios from developers, designers, and engineers worldwide. Find inspiration by role — frontend, full stack, AI, UX, and more. Free forever." />
    <meta name="keywords" content="developer portfolio, designer portfolio, portfolio inspiration, frontend portfolio, full stack portfolio, portfolio examples, portfolio ideas" />
    <meta name="author" content="Portfolio Explorer" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Portfolio Explorer" />
    <meta property="og:title"       content="Portfolio Explorer — Find your portfolio inspiration" />
    <meta property="og:description" content="1,750+ curated portfolios from developers and designers worldwide. Search by role and build yours faster." />
    <meta property="og:image"       content="/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="Portfolio Explorer — Premium portfolio platform" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Portfolio Explorer — Win clients with a premium portfolio" />
    <meta name="twitter:description" content="Beautiful case studies, private project gating, and a client portal." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://portfolioexplorer.io/" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- JSON-LD: Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Portfolio Explorer",
      "url": "https://portfolioexplorer.io",
      "description": "Premium portfolio platform for freelancers and agencies",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://portfolioexplorer.io/explore?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
