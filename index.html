    <title>Developer Portfolios</title>
    <!-- Google Fonts for Space Grotesk and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      /* Basic reset to ensure fonts apply and remove default button focus styles */
      body {
        margin: 0;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      button {
        font-family: inherit;
        -webkit-tap-highlight-color: transparent; /* Remove highlight on mobile */
      }
      button:focus-visible {
        outline: 2px solid #38bdf8; /* Custom focus style for accessibility */
        outline-offset: 2px;
      }
    </style>
  </head>

  </body>
